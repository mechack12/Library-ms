<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-md">
<div class="w-full max-w-4xl flex flex-col md:flex-row rounded-lg overflow-hidden shadow-2xl border border-outline-variant bg-surface-container-lowest">
<!-- Left Panel: Branding -->
<div class="hidden md:flex flex-col md:w-5/12 bg-deep-pine text-surface-container-lowest p-xl relative overflow-hidden">
<img alt="Library Interior" class="absolute inset-0 w-full h-full object-cover opacity-10 mix-blend-overlay" data-alt="A grand, traditional university library hall featuring soaring arches, warm wooden bookshelves reaching the ceiling, and soft ambient light filtering through tall windows, casting a serene, scholarly atmosphere. The image perfectly embodies the 'Scholarly Archive' aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuANSi7OpCYBEh2boA1RCnePlhYDu2YX--jIw6ubvRue8fAbcd1SLcTButgwcI_pDV6dGKHDY-3pemDCgmKdcfbqaZ9zyDVuA-wobfOydMVvthHB1Ka9PoUu8LjdxRr4i9LiXdX-Tr2nTO5nkqnJA0j2gFVfezU9xfwKzuXaVuQh3__0tThNCvQTP0JQrCfioITUxWh3BkYekmsjq8R_j3SL9KgZUaoUHb6JOkmkhBAqlObWpNrSfeXt7sDym04tuWzGJ_5pmin_bZk"/>
<div class="relative z-10 flex flex-col h-full justify-between">
<div>
<span class="material-symbols-outlined text-[48px] mb-md text-sage-green" style="font-variation-settings: 'FILL' 1;">account_balance</span>
<h1 class="font-display-lg text-display-lg mb-sm">Scholarly Archive</h1>
<p class="font-body-md text-surface-variant/80">Connecting minds with literature through a simplified digital gateway.</p>
</div>
<div class="p-md rounded border border-surface-variant/20 bg-primary/40 backdrop-blur-sm">
<p class="font-body-sm italic text-surface-variant/70">"The library is a place of magic, where every shelf tells a story."</p>
</div>
</div>
</div>
<!-- Right Panel: Login/Signup Interface -->
<div class="w-full md:w-7/12 p-lg md:p-xl flex flex-col bg-surface">
<div class="mb-md">
<h2 id="form-title" class="font-headline-lg text-deep-pine mb-xs">Welcome</h2>
<p id="form-subtitle" class="font-body-md text-on-surface-variant">Access your library collection</p>
</div>

<!-- Auth Mode Toggle -->
<div class="flex p-1 bg-surface-container-high rounded mb-md border border-outline-variant">
<button id="tab-login" onclick="switchMode('login')" class="flex-1 py-sm px-4 rounded bg-surface-container-lowest text-deep-pine font-label-lg shadow-sm flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined text-[20px]">login</span> Log In
</button>
<button id="tab-signup" onclick="switchMode('signup')" class="flex-1 py-sm px-4 rounded text-on-surface-variant hover:text-deep-pine font-label-lg transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">person_add</span> Sign Up
</button>
</div>

<!-- Role Toggle -->
<div class="flex p-1 bg-surface-container-high rounded mb-md border border-outline-variant">
<button id="role-student" onclick="switchRole('student')" class="flex-1 py-sm px-4 rounded bg-surface-container-lowest text-deep-pine font-label-lg shadow-sm flex items-center justify-center gap-2 transition-all">
<span class="material-symbols-outlined text-[20px]">school</span> Student
</button>
<button id="role-librarian" onclick="switchRole('librarian')" class="flex-1 py-sm px-4 rounded text-on-surface-variant hover:text-deep-pine font-label-lg transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">badge</span> Librarian
</button>
</div>

<!-- Status Message -->
<div id="status-msg" class="hidden mb-md p-sm rounded font-body-sm text-center"></div>

<!-- Auth Form -->
<form id="auth-form" class="flex flex-col gap-md">
<!-- Full Name (Sign Up only) -->
<div id="name-field" class="flex flex-col gap-xs hidden">
<label class="font-label-md text-on-surface-variant" for="fullName">Full Name</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">badge</span>
<input class="w-full pl-10 pr-4 py-sm rounded border border-outline-variant focus:border-sage-green focus:ring-1 focus:ring-sage-green font-body-md text-on-surface placeholder:text-outline/50 outline-none transition-shadow bg-surface-container-lowest" id="fullName" placeholder="e.g. John Doe" type="text"/>
</div>
</div>

<!-- Email -->
<div class="flex flex-col gap-xs">
<label class="font-label-md text-on-surface-variant" for="userId">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">mail</span>
<input class="w-full pl-10 pr-4 py-sm rounded border border-outline-variant focus:border-sage-green focus:ring-1 focus:ring-sage-green font-body-md text-on-surface placeholder:text-outline/50 outline-none transition-shadow bg-surface-container-lowest" id="userId" placeholder="your.email@scholarly.edu" type="email" required/>
</div>
</div>

<!-- Password -->
<div class="flex flex-col gap-xs">
<div class="flex justify-between items-center">
<label class="font-label-md text-on-surface-variant" for="password">Password</label>
<a id="forgot-link" class="font-label-md text-teal-blue hover:underline" href="#">Forgot?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
<input class="w-full pl-10 pr-4 py-sm rounded border border-outline-variant focus:border-sage-green focus:ring-1 focus:ring-sage-green font-body-md text-on-surface placeholder:text-outline/50 outline-none transition-shadow bg-surface-container-lowest" id="password" placeholder="••••••••" type="password" required minlength="6"/>
</div>
</div>

<!-- Confirm Password (Sign Up only) -->
<div id="confirm-pw-field" class="flex flex-col gap-xs hidden">
<label class="font-label-md text-on-surface-variant" for="confirmPassword">Confirm Password</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]">lock</span>
<input class="w-full pl-10 pr-4 py-sm rounded border border-outline-variant focus:border-sage-green focus:ring-1 focus:ring-sage-green font-body-md text-on-surface placeholder:text-outline/50 outline-none transition-shadow bg-surface-container-lowest" id="confirmPassword" placeholder="••••••••" type="password"/>
</div>
</div>

<!-- Submit -->
<button id="submit-btn" class="mt-md w-full py-sm px-md bg-sage-green hover:bg-secondary text-surface-container-lowest font-label-lg rounded shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2" type="submit">
Log In <span class="material-symbols-outlined text-[20px]">arrow_forward</span>
</button>
</form>

<div class="mt-xl pt-lg border-t border-outline-variant text-center">
<p id="switch-prompt" class="font-body-sm text-on-surface-variant">
Don't have an account? <a class="font-label-md text-deep-pine hover:text-teal-blue transition-colors cursor-pointer" onclick="switchMode('signup')">Create one now</a>
</p>
</div>
</div>
</div>

<script>
    let currentMode = 'login';
    let currentRole = 'student';

    function switchMode(mode) {
        currentMode = mode;
        const tabLogin = document.getElementById('tab-login');
        const tabSignup = document.getElementById('tab-signup');
        const nameField = document.getElementById('name-field');
        const confirmField = document.getElementById('confirm-pw-field');
        const forgotLink = document.getElementById('forgot-link');
        const submitBtn = document.getElementById('submit-btn');
        const formTitle = document.getElementById('form-title');
        const formSubtitle = document.getElementById('form-subtitle');
        const switchPrompt = document.getElementById('switch-prompt');
        hideStatus();

        const active = 'flex-1 py-sm px-4 rounded bg-surface-container-lowest text-deep-pine font-label-lg shadow-sm flex items-center justify-center gap-2 transition-all';
        const inactive = 'flex-1 py-sm px-4 rounded text-on-surface-variant hover:text-deep-pine font-label-lg transition-colors flex items-center justify-center gap-2';

        if (mode === 'signup') {
            tabSignup.className = active;
            tabLogin.className = inactive;
            nameField.classList.remove('hidden');
            confirmField.classList.remove('hidden');
            forgotLink.classList.add('hidden');
            submitBtn.innerHTML = 'Create Account <span class="material-symbols-outlined text-[20px]">person_add</span>';
            formTitle.textContent = 'Create Account';
            formSubtitle.textContent = 'Register as a new library member.';
            switchPrompt.innerHTML = 'Already have an account? <a class="font-label-md text-deep-pine hover:text-teal-blue transition-colors cursor-pointer" onclick="switchMode(\'login\')">Log in here</a>';
        } else {
            tabLogin.className = active;
            tabSignup.className = inactive;
            nameField.classList.add('hidden');
            confirmField.classList.add('hidden');
            forgotLink.classList.remove('hidden');
            submitBtn.innerHTML = 'Log In <span class="material-symbols-outlined text-[20px]">arrow_forward</span>';
            formTitle.textContent = 'Welcome';
            formSubtitle.textContent = 'Access your library collection';
            switchPrompt.innerHTML = 'Don\'t have an account? <a class="font-label-md text-deep-pine hover:text-teal-blue transition-colors cursor-pointer" onclick="switchMode(\'signup\')">Create one now</a>';
        }
    }

    function switchRole(role) {
        currentRole = role;
        const btnStudent = document.getElementById('role-student');
        const btnLibrarian = document.getElementById('role-librarian');
        const active = 'flex-1 py-sm px-4 rounded bg-surface-container-lowest text-deep-pine font-label-lg shadow-sm flex items-center justify-center gap-2 transition-all';
        const inactive = 'flex-1 py-sm px-4 rounded text-on-surface-variant hover:text-deep-pine font-label-lg transition-colors flex items-center justify-center gap-2';
        btnStudent.className = role === 'student' ? active : inactive;
        btnLibrarian.className = role === 'librarian' ? active : inactive;
    }

    function showStatus(msg, isError) {
        const el = document.getElementById('status-msg');
        el.textContent = msg;
        el.className = `mb-md p-sm rounded font-body-sm text-center ${isError ? 'bg-error-container text-on-error-container' : 'bg-secondary-container text-on-secondary-container'}`;
    }
    function hideStatus() {
        document.getElementById('status-msg').className = 'hidden mb-md p-sm rounded font-body-sm text-center';
    }

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('userId').value.trim();
        const password = document.getElementById('password').value;
        const submitBtn = document.getElementById('submit-btn');
        const originalHTML = submitBtn.innerHTML;

        submitBtn.innerHTML = '<span class="material-symbols-outlined text-[20px] animate-spin">sync</span> Please wait...';
        submitBtn.disabled = true;

        try {
            if (currentMode === 'signup') {
                const fullName = document.getElementById('fullName').value.trim();
                const confirmPw = document.getElementById('confirmPassword').value;
                if (!fullName) { showStatus('Please enter your full name.', true); return; }
                if (password !== confirmPw) { showStatus('Passwords do not match.', true); return; }
                if (password.length < 6) { showStatus('Password must be at least 6 characters.', true); return; }

                const { data, error } = await supabase.auth.signUp({
                    email, password,
                    options: { data: { full_name: fullName, role: currentRole, library_id: email.split('@')[0] } }
                });
                if (error) throw error;
                showStatus('Account created successfully! You can now log in.', false);
                setTimeout(() => switchMode('login'), 1500);
            } else {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) throw error;
                showStatus('Login successful! Redirecting...', false);
                setTimeout(() => {
                    window.location.href = currentRole === 'librarian' ? '../librarian_portal_1/code.html' : '../student_dashboard_1/code.html';
                }, 800);
            }
        } catch (err) {
            showStatus(err.message || 'An error occurred. Please try again.', true);
        } finally {
            submitBtn.innerHTML = originalHTML;
            submitBtn.disabled = false;
        }
    });

    (async () => {
        const { data: { session } } = await supabase.auth.getSession();
        if (session) {
            showStatus('You are already logged in. Redirecting...', false);
            setTimeout(() => { window.location.href = '../student_dashboard_1/code.html'; }, 800);
        }
    })();
</script>
</body></html>
