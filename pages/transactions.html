<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Transactions - Library Management System</title>
<link href="../assets/css/tailwind.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/notifications.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

</head>
<body class="bg-background text-on-background font-body-md antialiased flex">

<aside id="app-sidebar"></aside>

<div class="flex-1 ml-64 flex flex-col min-h-screen">
<header class="bg-soft-parchment border-b border-dusty-rose/20 sticky top-0 z-10">
    <div class="flex justify-between items-center px-lg py-sm h-16">
        <h2 class="font-headline-md text-deep-pine font-bold">Transaction History</h2>
        <div class="flex items-center gap-3">
            <select id="status-filter" class="bg-white border border-dusty-rose/30 rounded-lg px-3 py-2 font-label-md text-deep-pine text-sm outline-none focus:border-teal-blue">
                <option value="">All Transactions</option>
                <option value="active">Active Loans</option>
                <option value="returned">Returned</option>
            </select>
            <button class="text-dusty-rose hover:text-teal-blue transition-colors p-2 rounded-full hover:bg-dusty-rose/10">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <div class="w-9 h-9 rounded-full overflow-hidden border border-dusty-rose/20">
                <img id="user-avatar" alt="Avatar" class="w-full h-full object-cover" src="https://via.placeholder.com/150"/>
            </div>
        </div>
    </div>
</header>

<main class="flex-1 p-xl">
    <div class="max-w-6xl mx-auto">
        <!-- Stats Row -->
        <div id="stats-row" class="grid grid-cols-3 gap-md mb-8"></div>

        <!-- Table -->
        <div class="bg-white border border-dusty-rose/20 rounded-xl overflow-hidden shadow-sm">
            <div class="px-md py-4 border-b border-dusty-rose/10 flex justify-between items-center">
                <h3 class="font-headline-sm text-deep-pine font-semibold">Loan Records</h3>
                <span id="loan-count" class="text-dusty-rose font-label-md text-xs">Loading...</span>
            </div>
            <!-- Table Header -->
            <div class="grid grid-cols-5 px-md py-3 bg-surface-container-low text-xs font-semibold text-dusty-rose uppercase tracking-wider">
                <span class="col-span-2">Book / Borrower</span>
                <span>Borrowed On</span>
                <span>Due Date</span>
                <span>Status</span>
            </div>
            <div id="loans-list" class="divide-y divide-dusty-rose/10">
                <div class="px-md py-8 text-center text-dusty-rose">Loading...</div>
            </div>
        </div>
    </div>
</main>
</div>

<script>
let isLibrarian = false;

async function loadTransactions() {
    const filter = document.getElementById('status-filter').value;
    const list = document.getElementById('loans-list');
    list.innerHTML = '<div class="px-md py-8 text-center text-dusty-rose">Loading...</div>';

    const { data: { session } } = await window.sbClient.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    let query = window.sbClient.from('loans').select('*, books(title, author), library_users(full_name)');
    if (!isLibrarian) query = query.eq('user_id', session.user.id);
    if (filter) query = query.eq('status', filter);
    query = query.order('id', { ascending: false }).limit(100);

    const { data: loans, error } = await query;
    if (error) { list.innerHTML = `<div class="px-md py-8 text-center text-error">Error: ${error.message}</div>`; return; }

    document.getElementById('loan-count').textContent = `${loans.length} record${loans.length !== 1 ? 's' : ''}`;

    const active = loans.filter(l => l.status === 'active').length;
    const returned = loans.filter(l => l.status === 'returned').length;
    const overdue = loans.filter(l => l.status === 'active' && new Date(l.due_date) < new Date()).length;

    document.getElementById('stats-row').innerHTML = `
        <div class="bg-white border border-dusty-rose/20 rounded-xl p-md text-center">
            <p class="text-3xl font-bold text-teal-blue">${active}</p>
            <p class="font-body-sm text-dusty-rose mt-1">Active Loans</p>
        </div>
        <div class="bg-white border border-dusty-rose/20 rounded-xl p-md text-center">
            <p class="text-3xl font-bold text-sage-green">${returned}</p>
            <p class="font-body-sm text-dusty-rose mt-1">Returned</p>
        </div>
        <div class="bg-white border border-dusty-rose/20 rounded-xl p-md text-center">
            <p class="text-3xl font-bold text-error">${overdue}</p>
            <p class="font-body-sm text-dusty-rose mt-1">Overdue</p>
        </div>`;

    if (loans.length === 0) {
        list.innerHTML = '<div class="px-md py-10 text-center text-dusty-rose font-body-sm">No transaction records found.</div>';
        return;
    }

    list.innerHTML = loans.map(l => {
        const isOverdue = l.status === 'active' && new Date(l.due_date) < new Date();
        const statusBadge = l.status === 'returned'
            ? '<span class="px-2 py-1 rounded-full bg-green-100 text-green-800 text-xs font-semibold">Returned</span>'
            : isOverdue
            ? '<span class="px-2 py-1 rounded-full bg-red-100 text-red-800 text-xs font-semibold">Overdue</span>'
            : '<span class="px-2 py-1 rounded-full bg-blue-100 text-blue-800 text-xs font-semibold">Active</span>';
        const userDisplay = isLibrarian ? `<p class="font-label-md text-dusty-rose/70">${l.library_users?.full_name || 'Unknown'}</p>` : '';
        return `<div class="grid grid-cols-5 px-md py-3 items-center text-sm ${isOverdue ? 'bg-red-50/50' : ''}">
            <div class="col-span-2">
                <p class="font-body-md text-deep-pine font-medium truncate">${l.books?.title || 'Unknown'}</p>
                <p class="text-dusty-rose text-xs">${l.books?.author || ''}</p>
                ${userDisplay}
            </div>
            <span class="text-dusty-rose text-xs">${l.created_at ? new Date(l.created_at).toLocaleDateString() : 'N/A'}</span>
            <span class="text-xs ${isOverdue ? 'text-error font-semibold' : 'text-dusty-rose'}">${new Date(l.due_date).toLocaleDateString()}</span>
            <div>${statusBadge}</div>
        </div>`;
    }).join('');
}

async function init() {
    await window.initNav();
    await window.initNotifications();
    const { data: { session } } = await window.sbClient.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const avatarUrl = session.user.user_metadata?.profile_picture_url;
    if (avatarUrl) document.getElementById('user-avatar').src = avatarUrl;

    const { data: profile } = await window.sbClient.from('library_users').select('role').eq('id', session.user.id).single();
    if (profile?.role === 'librarian') {
        isLibrarian = true;
        const portalLabel = document.getElementById('portal-label');
        if (portalLabel) portalLabel.textContent = 'Librarian Portal';
        const navStudents = document.getElementById('nav-students');
        if (navStudents) navStudents.classList.remove('hidden');
        const navReports = document.getElementById('nav-reports');
        if (navReports) navReports.classList.remove('hidden');
    }
    loadTransactions();
    document.getElementById('status-filter').addEventListener('change', loadTransactions);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body></html>
