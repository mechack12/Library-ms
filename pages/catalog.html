    // Toast notification system
    function showToast(message, type = 'success') {
        const existing = document.getElementById('toast-notification');
        if (existing) existing.remove();

        const toast = document.createElement('div');
        toast.id = 'toast-notification';
        const bgColor = type === 'success' ? 'bg-tertiary-container text-on-tertiary-fixed' : 'bg-error-container text-on-error-container';
        const icon = type === 'success' ? 'check_circle' : 'error';
        toast.className = `fixed bottom-6 right-6 ${bgColor} px-6 py-4 rounded-xl shadow-2xl z-[100] flex items-center gap-3 font-body-md animate-slide-up border border-outline-variant`;
        toast.innerHTML = `<span class="material-symbols-outlined">${icon}</span> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.5s'; setTimeout(() => toast.remove(), 500); }, 4000);
    }

    async function loadBooks() {
        const grid = document.getElementById('book-catalog-grid');
        grid.innerHTML = '<p class="col-span-3 text-center py-10 font-body-md text-on-surface-variant">Loading catalog...</p>';

        // Get filter values
        const searchQuery = document.getElementById('global-search').value.toLowerCase();
        const availability = document.querySelector('input[name="availability"]:checked').value;
        const authorFilter = document.getElementById('filter-author').value;
        const isbnFilter = document.getElementById('filter-isbn').value;
        const sortOption = document.getElementById('sort-select').value;
        
        // Get checked genres
        const checkedGenres = Array.from(document.querySelectorAll('.genre-checkbox:checked')).map(cb => cb.value);

        // Build Supabase Query
        let query = window.sbClient.from('books').select('*');

        if (availability === 'available') {
            query = query.gt('available_copies', 0);
        } else if (availability === 'borrowed') {
            query = query.eq('available_copies', 0);
        }

        if (checkedGenres.length > 0) {
            query = query.in('category', checkedGenres);
        }

        if (authorFilter) {
            query = query.ilike('author', `%${authorFilter}%`);
        }

        if (isbnFilter) {
            query = query.eq('isbn', isbnFilter);
        }

        // Apply sorting
        if (sortOption === 'title') {
            query = query.order('title', { ascending: true });
        } else if (sortOption === 'author') {
            query = query.order('author', { ascending: true });
        } else {
            // default to newest
            query = query.order('created_at', { ascending: false });
        }

        const { data: books, error } = await query;

        if (error) {
            console.error('Error fetching books:', error);
            grid.innerHTML = '<p class="col-span-3 text-center py-10 font-body-md text-error">Failed to load catalog.</p>';
            return;
        }

        // Client-side text search (since global search acts on multiple columns)
        let filteredBooks = books;
        if (searchQuery) {
            filteredBooks = books.filter(b => 
                b.title.toLowerCase().includes(searchQuery) || 
                b.author.toLowerCase().includes(searchQuery) ||
                b.isbn.toLowerCase().includes(searchQuery)
            );
        }

        // Update count text
        const countEl = document.getElementById('catalog-count-text');
        if (countEl) countEl.textContent = `Showing ${filteredBooks.length} scholarly works`;

        grid.innerHTML = '';
        
        if (filteredBooks.length === 0) {
            grid.innerHTML = '<p class="col-span-3 text-center py-10 font-body-md text-on-surface-variant">No books match your filters.</p>';
            return;
        }

        filteredBooks.forEach((book, index) => {
            const isAvailable = book.available_copies > 0;
            const coverImg = bookCoverImages[index % bookCoverImages.length];

            const statusBadge = isAvailable 
                ? `<div class="absolute top-2 right-2 bg-surface/90 backdrop-blur border border-outline-variant text-primary font-label-md px-2 py-0.5 rounded flex items-center gap-1 shadow-sm"><span class="w-1.5 h-1.5 rounded-full bg-primary"></span> Available (${book.available_copies})</div>`
                : `<div class="absolute top-2 right-2 bg-surface/90 backdrop-blur border border-outline-variant text-on-surface-variant font-label-md px-2 py-0.5 rounded flex items-center gap-1 shadow-sm"><span class="w-1.5 h-1.5 rounded-full bg-on-surface-variant"></span> Borrowed</div>`;
            
            const actionButton = isAvailable
                ? `<button class="borrow-btn w-full bg-primary text-on-primary font-label-md py-2 rounded flex justify-center items-center gap-2 hover:bg-primary/90 transition-colors" data-book-id="${book.id}"><span class="material-symbols-outlined text-[18px]">bookmark_add</span> Borrow</button>`
                : `<button class="reserve-btn w-full bg-surface-container border border-primary text-primary font-label-md py-2 rounded flex justify-center items-center gap-2 hover:bg-primary/5 transition-colors" data-book-id="${book.id}"><span class="material-symbols-outlined text-[18px]">bookmark</span> Reserve</button>`;

            const card = document.createElement('div');
            card.className = `bg-surface-container-lowest border border-outline-variant rounded-xl overflow-hidden flex flex-col group hover:shadow-md transition-all duration-300 ${!isAvailable ? 'opacity-75' : ''}`;
            card.innerHTML = `
                <div class="h-48 bg-surface-container-lowest relative overflow-hidden border-b border-outline-variant">
                    <img alt="${book.title}" src="${coverImg}" class="w-full h-full object-cover object-center group-hover:scale-105 transition-transform duration-500" />
                    ${statusBadge}
                </div>
                <div class="p-4 flex-1 flex flex-col">
                    <div class="font-label-md text-secondary mb-1 uppercase tracking-wider">${book.category || 'Uncategorized'}</div>
                    <h3 class="font-headline-md text-on-surface leading-tight mb-1">${book.title}</h3>
                    <p class="font-body-sm text-on-surface-variant mb-1">${book.author}</p>
                    <p class="font-mono text-[11px] text-on-surface-variant/70 mb-4 mt-auto pt-2 border-t border-outline-variant">ISBN: ${book.isbn}</p>
                    ${actionButton}
                </div>
            `;
            grid.appendChild(card);
        });

        // Attach borrow AND reserve handlers via event delegation
        grid.addEventListener('click', async (e) => {
            const borrowBtn = e.target.closest('.borrow-btn');
            if (borrowBtn) {
                const bookId = borrowBtn.dataset.bookId;
                borrowBtn.disabled = true;
                borrowBtn.innerHTML = '<span class="material-symbols-outlined text-[18px] animate-spin">sync</span> Borrowing...';
                await borrowBook(bookId);
                return;
            }
            const reserveBtn = e.target.closest('.reserve-btn');
            if (reserveBtn) {
                const bookId = reserveBtn.dataset.bookId;
                reserveBtn.disabled = true;
                reserveBtn.innerHTML = '<span class="material-symbols-outlined text-[18px] animate-spin">sync</span> Reserving...';
                await reserveBook(bookId);
            }
        });
    }

    async function reserveBook(bookId) {
        try {
            const { data: { session } } = await window.sbClient.auth.getSession();
            if (!session) { showToast('Please log in first.', 'error'); window.location.href = 'login.html'; return; }

            // Check for existing reservation
            const { data: existing } = await window.sbClient.from('reservations').select('id').eq('user_id', session.user.id).eq('book_id', bookId).eq('status', 'pending').maybeSingle();
            if (existing) { showToast('You already reserved this book!', 'error'); loadBooks(); return; }

            const { error } = await window.sbClient.from('reservations').insert({ user_id: session.user.id, book_id: bookId, status: 'pending' });
            if (error) throw error;

            showToast('Book reserved! You\'ll be notified when it\'s available. <a href="reservations.html" style="text-decoration:underline">View reservations</a>', 'success');
            loadBooks();
        } catch (err) {
            showToast(err.message || 'Failed to reserve book.', 'error');
            loadBooks();
        }
    }

    async function borrowBook(bookId) {
        try {
            const { data: { session } } = await window.sbClient.auth.getSession();
            if (!session) {
                showToast('Please log in to borrow books.', 'error');
                window.location.href = 'login.html';
                return;
            }

            // Check if user already has this book borrowed
            const { data: existingLoan } = await window.sbClient
                .from('loans')
                .select('id')
                .eq('user_id', session.user.id)
                .eq('book_id', bookId)
                .eq('status', 'active')
                .maybeSingle();

            if (existingLoan) {
                showToast('You already have this book borrowed!', 'error');
                loadBooks();
                return;
            }

            // Check max loans (limit 10)
            const { count: activeLoans } = await window.sbClient
                .from('loans')
                .select('*', { count: 'exact', head: true })
                .eq('user_id', session.user.id)
                .eq('status', 'active');

            if (activeLoans >= 10) {
                showToast('You have reached the maximum of 10 active loans.', 'error');
                loadBooks();
                return;
            }

            // Get current book data
            const { data: book } = await window.sbClient
                .from('books')
                .select('available_copies')
                .eq('id', bookId)
                .single();

            if (!book || book.available_copies <= 0) {
                showToast('This book is no longer available.', 'error');
                loadBooks();
                return;
            }

            // Set due date to 14 days from now
            const dueDate = new Date();
            dueDate.setDate(dueDate.getDate() + 14);

            // Insert loan record
            const { error: loanError } = await window.sbClient
                .from('loans')
                .insert({
                    book_id: bookId,
                    user_id: session.user.id,
                    due_date: dueDate.toISOString(),
                    status: 'active'
                });

            if (loanError) throw loanError;

            // Decrement available copies
            const { error: updateError } = await window.sbClient
                .from('books')
                .update({ available_copies: book.available_copies - 1 })
                .eq('id', bookId);

            if (updateError) throw updateError;

            showToast(`Book borrowed successfully! Due: ${dueDate.toLocaleDateString()}`, 'success');
            loadBooks(); // Refresh catalog

        } catch (err) {
            console.error('Borrow error:', err);
            showToast(err.message || 'Failed to borrow book. Please try again.', 'error');
            loadBooks();
        }
    }

    async function checkAuthAndLoad() {
        const { data: { session } } = await window.sbClient.auth.getSession();
        if (!session) {
            window.location.href = 'login.html';
            return;
        }
        
        const role = session.user.user_metadata?.role || 'student';
        // Update dashboard link according to role
        const dashboardLink = document.getElementById('nav-dashboard');
        if (dashboardLink) {
            dashboardLink.href = role === 'librarian' ? 'librarian-dashboard.html' : 'student-dashboard.html';
        }
        
        // Highlight Inventory as active (already styled via classes above)
        loadBooks();
    }

    // Load data when page loads
    document.addEventListener('DOMContentLoaded', async () => {
        // Wait for dynamic navigation and header injection
        await initNav();
        initNotifications();

        // Read ?q= from URL and pre-fill search input
        const urlParams = new URLSearchParams(window.location.search);
        const searchFromUrl = urlParams.get('q');
        if (searchFromUrl) {
            const searchInput = document.getElementById('global-search');
            if (searchInput) {
                searchInput.value = searchFromUrl;
            }
        }

        checkAuthAndLoad();

        // Filter event listeners
        document.getElementById('apply-filters-btn').addEventListener('click', loadBooks);

        document.getElementById('reset-filters-btn').addEventListener('click', () => {
            const searchInput = document.getElementById('global-search');
            if (searchInput) searchInput.value = '';
            document.querySelector('input[name="availability"][value="all"]').checked = true;
            document.getElementById('filter-author').value = '';
            document.getElementById('filter-isbn').value = '';
            document.getElementById('genre-search').value = '';
            document.querySelectorAll('.genre-checkbox').forEach(cb => cb.checked = false);
            document.getElementById('sort-select').value = 'created_at';
            loadBooks();
        });

        document.getElementById('sort-select').addEventListener('change', loadBooks);

        // Global search with debounce (on the post-injection element)
        let searchTimeout;
        const searchInput = document.getElementById('global-search');
        if (searchInput) {
            searchInput.addEventListener('input', () => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(loadBooks, 400);
            });
        }

        // Genre search filter (UI only)
        document.getElementById('genre-search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const labels = document.getElementById('genre-list').querySelectorAll('label');
            labels.forEach(label => {
                const text = label.textContent.toLowerCase();
                label.style.display = text.includes(term) ? 'flex' : 'none';
            });
        });
    });
</script>
</body></html>
