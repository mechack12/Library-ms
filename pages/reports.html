<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reports - Scholarly Archive</title>
<link href="../assets/css/tailwind.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase-config.js"></script>
<script src="../js/nav.js"></script>
<script src="../js/notifications.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<style>
.bar-fill { transition: width 1s ease; }
</style>
</head>
<body class="bg-soft-parchment text-deep-pine font-body-md antialiased flex">

<!-- SideNavBar -->
<aside id="app-sidebar"></aside>

<div class="flex-1 ml-64 flex flex-col min-h-screen">
<header class="bg-soft-parchment border-b border-dusty-rose/20 sticky top-0 z-10">
    <div class="flex justify-between items-center px-lg py-sm h-16">
        <h2 class="font-headline-md text-deep-pine font-bold">Reports & Analytics</h2>
        <div class="flex items-center gap-3">
            <p id="generated-time" class="font-label-md text-dusty-rose text-xs"></p>
            <button class="text-dusty-rose hover:text-teal-blue transition-colors p-2 rounded-full hover:bg-dusty-rose/10">
                <span class="material-symbols-outlined">notifications</span>
            </button>
            <div class="w-9 h-9 rounded-full overflow-hidden border border-dusty-rose/20">
                <img id="user-avatar" alt="Avatar" class="w-full h-full object-cover" src="https://via.placeholder.com/150"/>
            </div>
        </div>
    </div>
</header>

<main class="flex-1 p-xl overflow-y-auto">
    <div class="max-w-6xl mx-auto space-y-8">
        <!-- KPI Cards -->
        <div id="kpi-cards" class="grid grid-cols-2 md:grid-cols-4 gap-md"></div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
            <!-- Genre Popularity -->
            <div class="bg-white border border-dusty-rose/20 rounded-xl p-md shadow-sm">
                <h3 class="font-headline-sm text-deep-pine font-semibold mb-4 flex items-center gap-2">
                    <span class="material-symbols-outlined text-teal-blue">bar_chart</span> Most Popular Genres
                </h3>
                <div id="genre-chart" class="space-y-3"></div>
            </div>

            <!-- Recent Activity -->
            <div class="bg-white border border-dusty-rose/20 rounded-xl p-md shadow-sm">
                <h3 class="font-headline-sm text-deep-pine font-semibold mb-4 flex items-center gap-2">
                    <span class="material-symbols-outlined text-sage-green">history</span> Recent Borrowing Activity
                </h3>
                <div id="activity-list" class="space-y-2"></div>
            </div>
        </div>

        <!-- Most Borrowed Books -->
        <div class="bg-white border border-dusty-rose/20 rounded-xl overflow-hidden shadow-sm">
            <div class="px-md py-4 border-b border-dusty-rose/10">
                <h3 class="font-headline-sm text-deep-pine font-semibold">Most Borrowed Books</h3>
            </div>
            <div id="top-books-list" class="divide-y divide-dusty-rose/10"></div>
        </div>
    </div>
</main>
</div>

<script>
async function init() {
    await window.initNav();
    await window.initNotifications();
    const { data: { session } } = await window.sbClient.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    const avatarUrl = session.user.user_metadata?.profile_picture_url;
    if (avatarUrl) document.getElementById('user-avatar').src = avatarUrl;

    const { data: profile } = await window.sbClient.from('library_users').select('role').eq('id', session.user.id).single();
    if (profile?.role !== 'librarian') { window.location.href = 'student-dashboard.html'; return; }

    document.getElementById('generated-time').textContent = 'Generated: ' + new Date().toLocaleString();

    // Parallel data fetching
    const [
        { count: totalBooks },
        { count: totalStudents },
        { count: totalActiveLoans },
        { data: allLoans },
        { data: books },
        { data: recentLoans }
    ] = await Promise.all([
        window.sbClient.from('books').select('*', { count: 'exact', head: true }),
        window.sbClient.from('library_users').select('*', { count: 'exact', head: true }).eq('role', 'student'),
        window.sbClient.from('loans').select('*', { count: 'exact', head: true }).eq('status', 'active'),
        window.sbClient.from('loans').select('book_id, books(category)').eq('status', 'returned'),
        window.sbClient.from('books').select('id, title, author, category'),
        window.sbClient.from('loans').select('*, books(title, author), library_users(full_name)').order('created_at', { ascending: false }).limit(8)
    ]);

    const overdueCount = recentLoans ? recentLoans.filter(l => l.status === 'active' && new Date(l.due_date) < new Date()).length : 0;

    // KPI Cards
    document.getElementById('kpi-cards').innerHTML = [
        { label: 'Total Books', value: totalBooks || 0, icon: 'library_books', color: 'text-teal-blue', bg: 'bg-teal-blue/10' },
        { label: 'Students', value: totalStudents || 0, icon: 'group', color: 'text-sage-green', bg: 'bg-sage-green/10' },
        { label: 'Active Loans', value: totalActiveLoans || 0, icon: 'bookmark', color: 'text-deep-pine', bg: 'bg-deep-pine/10' },
        { label: 'Total Returns', value: (allLoans || []).length, icon: 'undo', color: 'text-dusty-rose', bg: 'bg-dusty-rose/10' },
    ].map(card => `<div class="bg-white border border-dusty-rose/20 rounded-xl p-md flex items-center gap-4 shadow-sm">
        <div class="${card.bg} p-3 rounded-xl"><span class="material-symbols-outlined ${card.color} text-[28px]">${card.icon}</span></div>
        <div><p class="text-3xl font-bold ${card.color}">${card.value}</p><p class="font-body-sm text-dusty-rose mt-1">${card.label}</p></div>
    </div>`).join('');

    // Genre chart from returned loans
    const genreCount = {};
    (allLoans || []).forEach(l => {
        const cat = l.books?.category || 'Uncategorized';
        genreCount[cat] = (genreCount[cat] || 0) + 1;
    });

    // Also count from all books if no loan data
    if (Object.keys(genreCount).length === 0 && books) {
        books.forEach(b => {
            const cat = b.category || 'Uncategorized';
            genreCount[cat] = (genreCount[cat] || 0) + 1;
        });
    }

    const sortedGenres = Object.entries(genreCount).sort((a, b) => b[1] - a[1]).slice(0, 6);
    const maxGenreCount = sortedGenres.length > 0 ? sortedGenres[0][1] : 1;
    const colors = ['bg-teal-blue', 'bg-sage-green', 'bg-deep-pine', 'bg-dusty-rose', 'bg-blue-300', 'bg-slate-300'];

    document.getElementById('genre-chart').innerHTML = sortedGenres.length === 0
        ? '<p class="text-dusty-rose text-center py-4 font-body-sm">Not enough data yet.</p>'
        : sortedGenres.map(([genre, count], i) => `
        <div>
            <div class="flex justify-between items-center mb-1">
                <span class="font-body-sm text-deep-pine">${genre}</span>
                <span class="font-label-md text-dusty-rose">${count}</span>
            </div>
            <div class="w-full bg-surface-variant rounded-full h-2.5 overflow-hidden">
                <div class="bar-fill ${colors[i % colors.length]} h-2.5 rounded-full" style="width: ${Math.round((count / maxGenreCount) * 100)}%"></div>
            </div>
        </div>`).join('');

    // Recent Activity
    document.getElementById('activity-list').innerHTML = (recentLoans || []).slice(0, 6).map(l => {
        const isReturned = l.status === 'returned';
        return `<div class="flex items-center gap-3 py-2">
            <div class="w-8 h-8 rounded-full ${isReturned ? 'bg-sage-green/10' : 'bg-teal-blue/10'} flex items-center justify-center flex-shrink-0">
                <span class="material-symbols-outlined text-[16px] ${isReturned ? 'text-sage-green' : 'text-teal-blue'}">${isReturned ? 'undo' : 'bookmark_add'}</span>
            </div>
            <div class="flex-1 min-w-0">
                <p class="font-body-sm text-deep-pine truncate"><strong>${l.library_users?.full_name || 'Unknown'}</strong> ${isReturned ? 'returned' : 'borrowed'} "${l.books?.title || 'Unknown'}"</p>
                <p class="text-xs text-dusty-rose">${new Date(l.created_at).toLocaleDateString()}</p>
            </div>
        </div>`;
    }).join('') || '<p class="text-dusty-rose font-body-sm">No recent activity.</p>';

    // Most borrowed books (count loans per book)
    const bookLoanCount = {};
    (allLoans || []).forEach(l => { if (l.book_id) bookLoanCount[l.book_id] = (bookLoanCount[l.book_id] || 0) + 1; });
    const sortedBooks = Object.entries(bookLoanCount).sort((a, b) => b[1] - a[1]).slice(0, 5);
    const bookMap = {};
    (books || []).forEach(b => { bookMap[b.id] = b; });

    document.getElementById('top-books-list').innerHTML = sortedBooks.length === 0
        ? '<div class="px-md py-8 text-center text-dusty-rose font-body-sm">No borrowing history yet. Data will appear as books are borrowed.</div>'
        : sortedBooks.map(([bookId, count], i) => {
            const book = bookMap[bookId] || {};
            return `<div class="px-md py-3 flex items-center gap-4">
                <span class="w-8 h-8 rounded-full bg-deep-pine text-soft-parchment flex items-center justify-center font-bold text-sm flex-shrink-0">${i + 1}</span>
                <div class="flex-1 min-w-0">
                    <p class="font-body-md text-deep-pine font-medium truncate">${book.title || 'Unknown'}</p>
                    <p class="font-body-sm text-dusty-rose">${book.author || ''} · <span class="text-teal-blue">${book.category || ''}</span></p>
                </div>
                <div class="text-right flex-shrink-0">
                    <p class="font-bold text-deep-pine text-lg">${count}</p>
                    <p class="text-xs text-dusty-rose">borrows</p>
                </div>
            </div>`;
        }).join('');
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body></html>
