</div>

    // Toast notification
    function showToast(message, type = 'success') {
        const existing = document.getElementById('toast-notification');
        if (existing) existing.remove();
        const toast = document.createElement('div');
        toast.id = 'toast-notification';
        const bgColor = type === 'success' ? 'bg-secondary-container text-on-secondary-container' : 'bg-error-container text-on-error-container';
        const icon = type === 'success' ? 'check_circle' : 'error';
        toast.className = `fixed bottom-6 right-6 ${bgColor} px-6 py-4 rounded-xl shadow-2xl z-[100] flex items-center gap-3 font-body-md border border-dusty-rose/20`;
        toast.innerHTML = `<span class="material-symbols-outlined">${icon}</span> ${message}`;
        document.body.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity 0.5s'; setTimeout(() => toast.remove(), 500); }, 4000);
    }

    async function returnBook(loanId, bookId) {
        try {
            // Update loan status
            const { error: loanError } = await window.sbClient
                .from('loans')
                .update({ status: 'returned', return_date: new Date().toISOString() })
                .eq('id', loanId);
            if (loanError) throw loanError;

            // Increment available copies
            const { data: book } = await window.sbClient.from('books').select('available_copies').eq('id', bookId).single();
            if (book) {
                await window.sbClient.from('books').update({ available_copies: book.available_copies + 1 }).eq('id', bookId);
            }

            showToast('Book returned successfully!');
            loadDashboard();
        } catch (err) {
            showToast(err.message || 'Failed to return book.', 'error');
        }
    }

    async function loadDashboard() {
        const { data: { session } } = await window.sbClient.auth.getSession();
        
        if (!session) {
            document.getElementById('welcome-text').innerText = "Welcome, Student.";
            document.getElementById('dashboard-loans').innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-center py-10">
                    <span class="material-symbols-outlined text-[48px] text-dusty-rose mb-4">lock</span>
                    <h3 class="font-headline-md text-deep-pine mb-2">Please Log In</h3>
                    <p class="font-body-sm text-dusty-rose mb-6">Log in to view your current library loans and reservations.</p>
                    <button onclick="window.location.href='login.html'" class="bg-sage-green text-white px-6 py-2 rounded-lg font-label-md">Log In Now</button>
                </div>
            `;
            return;
        }

        // Fetch user profile from DB for real name and avatar
        let name = session.user.user_metadata?.full_name || session.user.email.split('@')[0];
        let avatarUrl = session.user.user_metadata?.profile_picture_url;

        try {
            const { data: profile } = await window.sbClient
                .from('library_users')
                .select('full_name, profile_picture_url')
                .eq('id', session.user.id)
                .single();
            if (profile) {
                if (profile.full_name) name = profile.full_name;
                if (profile.profile_picture_url) avatarUrl = profile.profile_picture_url;
            }
        } catch (e) {
            console.warn('Dashboard profile load failed:', e);
        }

        // Set welcome
        document.getElementById('welcome-text').innerText = `Welcome back, ${name}.`;

        // Set avatar
        if (avatarUrl) {
            const avatarImg = document.getElementById('user-avatar');
            if (avatarImg) avatarImg.src = avatarUrl;
        }

        // Fetch loans
        const { data: loans, error } = await window.sbClient
            .from('loans')
            .select('*, books(id, title)')
            .eq('user_id', session.user.id)
            .eq('status', 'active');

        const loanContainer = document.getElementById('dashboard-loans');
        
        if (error) {
            loanContainer.innerHTML = '<p class="text-error">Failed to load loans.</p>';
            return;
        }

        const quotaUsed = loans ? loans.length : 0;
        const limit = 10;
        const percentage = (quotaUsed / limit) * 100;

        // Check for overdue
        const overdueLoans = loans ? loans.filter(l => new Date(l.due_date) < new Date()) : [];
        const overdueAlert = document.getElementById('overdue-alert');
        if (overdueLoans.length > 0) {
            overdueAlert.classList.remove('hidden');
            document.getElementById('overdue-text').textContent = `You have ${overdueLoans.length} overdue book(s). Please return them to avoid penalties.`;
        }

        loanContainer.innerHTML = `
            <div class="absolute top-0 right-0 w-64 h-64 bg-primary-fixed rounded-full blur-3xl opacity-20 -mr-20 -mt-20"></div>
            <div class="flex justify-between items-start mb-lg relative z-10">
                <div>
                    <h3 class="font-headline-md text-headline-md text-deep-pine">Current Loans</h3>
                    <p class="font-body-sm text-body-sm text-dusty-rose mt-1">${quotaUsed} active loan(s)</p>
                </div>
                <span class="bg-soft-parchment text-deep-pine font-label-md px-3 py-1 rounded-full border border-dusty-rose/20">${quotaUsed} / ${limit} Quota Used</span>
            </div>
            
            <div class="relative z-10 mb-6 flex flex-col gap-2">
                ${loans && loans.length > 0 
                    ? loans.map(l => {
                        const isOverdue = new Date(l.due_date) < new Date();
                        return `<div class="bg-surface-container-low p-3 rounded border ${isOverdue ? 'border-error/30 bg-error-container/20' : 'border-dusty-rose/10'} flex justify-between items-center">
                            <div>
                                <span class="font-body-md text-deep-pine">${l.books?.title || 'Unknown'}</span>
                                <span class="font-label-md ${isOverdue ? 'text-error' : 'text-dusty-rose'} ml-3">Due: ${new Date(l.due_date).toLocaleDateString()}${isOverdue ? ' (OVERDUE)' : ''}</span>
                            </div>
                            <button onclick="returnBook('${l.id}', '${l.books?.id}')" class="bg-teal-blue text-white px-3 py-1 rounded font-label-md hover:opacity-90 transition-opacity flex items-center gap-1">
                                <span class="material-symbols-outlined text-[16px]">undo</span> Return
                            </button>
                        </div>`;
                    }).join('')
                    : '<p class="font-body-md text-dusty-rose">You have no active loans. Visit the <a href="catalog.html" class="text-teal-blue hover:underline">catalog</a> to borrow books!</p>'}
            </div>

            <div class="mt-auto relative z-10">
                <div class="w-full bg-surface-container-low h-3 rounded-full overflow-hidden flex">
                    <div class="bg-sage-green h-full transition-all duration-500" style="width: ${percentage}%;"></div>
                    <div class="bg-surface-variant h-full flex-1"></div>
                </div>
                <div class="flex justify-between mt-sm text-label-md text-dusty-rose">
                    <span>0</span>
                    <span>Library Capacity Limit (${limit})</span>
                </div>
            </div>
        `;

        // Load Action Hub dynamically
        await loadActionHub(session);
    }

    async function loadActionHub(session) {
        const hub = document.getElementById('action-hub-cards');

        // Fetch recent arrivals (3 newest books)
        const { data: recentBooks } = await window.sbClient
            .from('books')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(3);

        // Fetch user's active loan count
        const { count: myLoansCount } = await window.sbClient
            .from('loans')
            .select('*', { count: 'exact', head: true })
            .eq('user_id', session.user.id)
            .eq('status', 'active');

        // Fetch total books count
        const { count: totalBooks } = await window.sbClient
            .from('books')
            .select('*', { count: 'exact', head: true });

        hub.innerHTML = '';

        // Card 1: My Active Loans summary
        hub.innerHTML += `
            <div class="bg-soft-parchment border border-dusty-rose/20 rounded-xl p-md hover:shadow-[0_4px_12px_rgba(34,49,39,0.05)] transition-shadow flex flex-col h-full">
                <div class="w-full h-32 bg-surface-variant rounded-lg mb-4 overflow-hidden relative">
                    <img alt="My Loans" class="w-full h-full object-cover" src="${coverImages[0]}" />
                    <span class="absolute top-2 right-2 bg-white/90 backdrop-blur-sm text-deep-pine font-label-md px-2 py-1 rounded text-xs">${myLoansCount || 0} Active</span>
                </div>
                <h4 class="font-headline-sm text-headline-sm text-deep-pine mb-1">My Active Loans</h4>
                <p class="font-body-sm text-body-sm text-dusty-rose mb-4 flex-1">You have ${myLoansCount || 0} book(s) currently checked out.</p>
                <a href="catalog.html" class="w-full border border-teal-blue text-teal-blue font-label-md py-2 rounded-lg hover:bg-teal-blue/5 transition-colors text-center block">Browse Catalog</a>
            </div>
        `;

        // Card 2: Recommended (based on total catalog)
        hub.innerHTML += `
            <div class="bg-soft-parchment border border-dusty-rose/20 rounded-xl p-md hover:shadow-[0_4px_12px_rgba(34,49,39,0.05)] transition-shadow flex flex-col h-full">
                <div class="w-full h-32 bg-surface-variant rounded-lg mb-4 overflow-hidden relative">
                    <img alt="Library shelf" class="w-full h-full object-cover" src="${coverImages[1]}" />
                </div>
                <h4 class="font-headline-sm text-headline-sm text-deep-pine mb-1">Explore the Library</h4>
                <p class="font-body-sm text-body-sm text-dusty-rose mb-4 flex-1">${totalBooks || 0} titles across all categories are available in the catalog.</p>
                <a href="catalog.html" class="w-full bg-sage-green text-white font-label-md py-2 rounded-lg hover:bg-opacity-90 transition-opacity text-center block">Explore Catalog</a>
            </div>
        `;

        // Card 3: Recent Arrivals (real data)
        const recentTitle = recentBooks && recentBooks.length > 0 ? recentBooks[0].title : 'New books';
        const recentCount = recentBooks ? recentBooks.length : 0;
        hub.innerHTML += `
            <div class="bg-soft-parchment border border-dusty-rose/20 rounded-xl p-md hover:shadow-[0_4px_12px_rgba(34,49,39,0.05)] transition-shadow flex flex-col h-full">
                <div class="w-full h-32 bg-surface-variant rounded-lg mb-4 overflow-hidden relative">
                    <img alt="New books" class="w-full h-full object-cover" src="${coverImages[2]}" />
                    <span class="absolute top-2 right-2 bg-sage-green text-white font-label-md px-2 py-1 rounded text-xs">New</span>
                </div>
                <h4 class="font-headline-sm text-headline-sm text-deep-pine mb-1">Recent Arrivals</h4>
                <p class="font-body-sm text-body-sm text-dusty-rose mb-4 flex-1">Latest: "${recentTitle}" and ${recentCount - 1 > 0 ? recentCount - 1 + ' more' : 'others'}.</p>
                <a href="catalog.html" class="w-full border border-dusty-rose text-dusty-rose font-label-md py-2 rounded-lg hover:bg-dusty-rose/5 transition-colors text-center block">Browse</a>
            </div>
        `;
    }

    document.addEventListener('DOMContentLoaded', () => { initNav().then(() => initNotifications()); loadDashboard(); });
</script>
